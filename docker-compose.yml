services:
  ollama:
    image: ollama/ollama:latest
    container_name: localmind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: localmind-backend
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      LOCALMIND_CHAT_MODEL: qwen2.5:3b
      LOCALMIND_EMBEDDING_MODEL: all-minilm
      DATABASE_URL: sqlite:///./database/localmind.db
      CHROMA_DIR: ./vectorstore
      UPLOAD_DIR: ./uploads
      EXPORT_DIR: ./exports
      LOG_DIR: ./logs
      CORS_ORIGIN: http://localhost:3000
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
    volumes:
      - backend_database:/app/database
      - backend_vectorstore:/app/vectorstore
      - backend_uploads:/app/uploads
      - backend_exports:/app/exports
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: localmind-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    restart: unless-stopped

volumes:
  ollama_data:
  backend_database:
  backend_vectorstore:
  backend_uploads:
  backend_exports:
  backend_logs:
